name = "hex-lll-mathlib"
defaultTargets = ["HexLLLMathlib"]

# The full transitive Hex closure is pinned explicitly. Lake does not reconcile
# mismatched revisions of a package required at more than one point in the
# graph, so every Hex pin here must move together with its source repo.
[[require]]
name = "HexBasic"
git = "https://github.com/kim-em/hex-basic.git"
rev = "f1580d28c2e9ff9e8d4d7cdef9dccbaa17780b03"

[[require]]
name = "HexLLL"
git = "https://github.com/kim-em/hex-lll.git"
rev = "72e42ed35d0907301b2a323988944404e5628feb"

